<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator | SSCODE Product</title>
    <link rel="stylesheet" href="Agec.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="site-header">
        <div class="logo">AgeTrack</div>
        <nav class="nav-menu">
            <a href="index.html">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <div class="app-layout">
        
        <aside class="sidebar">
            
            <button class="mega-btn-wrapper active">
                <div class="mega-btn-inner">
                    <i class="fa-solid fa-calculator"></i>
                    <div>
                        <span class="btn-title">Age Calculator</span>
                        <span class="btn-sub">Precision Tracking</span>
                    </div>
                </div>
            </button>
            
            <button class="mega-btn-wrapper disabled" onclick="alert('Time Converter is launching soon!')">
                <div class="mega-btn-inner">
                    <i class="fa-solid fa-stopwatch"></i>
                    <div>
                        <span class="btn-title">Time Converter</span>
                        <span class="btn-sub">Global Time Zones</span>
                    </div>
                </div>
                <div class="coming-soon-ribbon">SOON</div>
            </button>
            
            <button class="mega-btn-wrapper disabled" onclick="alert('BMI Tracker is launching soon!')">
                <div class="mega-btn-inner">
                    <i class="fa-solid fa-weight-scale"></i>
                    <div>
                        <span class="btn-title">BMI Tracker</span>
                        <span class="btn-sub">Health Metrics</span>
                    </div>
                </div>
                <div class="coming-soon-ribbon">SOON</div>
            </button>

        </aside>

        <main class="main-content">
            <section class="intro-section">
                <div class="tagbox">
                    <div class="tag">PRODUCT UTILITY &wedbar;</div>
                </div>
                <h1>PRECISION <br> AGE TRACKING</h1>
            </section>

            <section class="product-container">
                <div class="container">
                    <div class="calculator">
                        <h1>Calculate <span>my age</span></h1>
                        <div class="input-box">
                            <input type="date" id="date" title="Select your birth date">
                            <button id="calcBtn" onclick="CalculateAge()">Calculate</button>
                            
                            <div class="result-wrapper">
                                <div id="result">> Ready for input...</div>
                                <div id="zodiacContainer" style="display: none; margin-top: 20px;">
                                    <button id="zodiacBtn" class="stylish-btn" onclick="showZodiac()">✨ Reveal Zodiac & Stone</button>
                                    <div id="zodiacResult" class="zodiac-box" style="display: none;"></div>
                                </div>
                                <button id="copyBtn" onclick="copyResult()" title="Copy Result">
                                    <i class="fa-regular fa-copy"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 SSCODE Technologies. All rights reserved.</p>
    </footer>

    <script>
        // DOMContentLoaded ensure karta hai ki pehle poora design load ho, fir logic chale
        document.addEventListener("DOMContentLoaded", function() {
            
            const userInput = document.getElementById("date");
            const resultDisplay = document.getElementById("result");
            const copyBtn = document.getElementById("copyBtn"); 
            const calcBtn = document.getElementById("calcBtn"); 
            const zContainer = document.getElementById("zodiacContainer");
            const zResult = document.getElementById("zodiacResult");
            const zBtn = document.getElementById("zodiacBtn");

            // Future date select karne se rokna
            if(userInput) {
                userInput.max = new Date().toISOString().split("T")[0];
            }

            // BUTTON CLICK EVENT (HTML onclick ki jarurat nahi)
            if(calcBtn) {
                calcBtn.addEventListener("click", CalculateAge);
            }

            // ENTER KEY LOGIC
            document.addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault(); 
                    CalculateAge();
                }
            });

            function CalculateAge() {
                if (!userInput || !userInput.value) {
                    typeEffect("> ERROR: PLEASE SELECT A BIRTH DATE...");
                    return;
                }

                // Reset Zodiac UI
                if (zContainer) {
                    zContainer.style.display = "none";
                    zResult.style.display = "none";
                    if(zBtn) zBtn.style.display = "inline-block";
                }

                const birthDate = new Date(userInput.value);
                const today = new Date();

                let y3 = today.getFullYear() - birthDate.getFullYear();
                let m3 = today.getMonth() - birthDate.getMonth();
                let d3 = today.getDate() - birthDate.getDate();

                if (d3 < 0) {
                    m3--;
                    d3 += getDaysInMonth(today.getFullYear(), today.getMonth());
                }
                if (m3 < 0) {
                    y3--;
                    m3 += 12;
                }

                const timeDiff = today.getTime() - birthDate.getTime();
                const totalDays = Math.floor(timeDiff / (1000 * 3600 * 24));

                let nextBirthday = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());
                if (today > nextBirthday) {
                    nextBirthday.setFullYear(today.getFullYear() + 1);
                }
                const nextBdayDiff = nextBirthday.getTime() - today.getTime();
                const nextBdayDays = Math.ceil(nextBdayDiff / (1000 * 3600 * 24));

                const fullText = `> STATUS: SUCCESS\n> AGE: [${y3}] YRS, [${m3}] MOS, [${d3}] DAYS\n> TOTAL LIVED: [${totalDays}] DAYS\n> NEXT B-DAY: IN [${nextBdayDays}] DAYS`;
                
                typeEffect(fullText);
            }

            function typeEffect(text) {
                let i = 0;
                if(!resultDisplay) return;
                resultDisplay.innerHTML = ""; 
                
                if(copyBtn) copyBtn.style.display = "none";
                if(calcBtn) {
                    calcBtn.disabled = true;
                    calcBtn.innerText = "Processing...";
                }

                const timer = setInterval(() => {
                    if (i < text.length) {
                        let char = text.charAt(i);
                        if (char === '\n') {
                            resultDisplay.innerHTML += '<br>';
                        } else {
                            resultDisplay.innerHTML += char;
                        }
                        i++;
                    } else {
                        clearInterval(timer);
                        if(calcBtn) {
                            calcBtn.disabled = false;
                            calcBtn.innerText = "Calculate";
                        }
                        
                        let formatted = resultDisplay.innerHTML
                            .replace(/\[/g, '<span style="color: white; font-weight: bold;">')
                            .replace(/\]/g, '</span>');
                        resultDisplay.innerHTML = formatted;
                        
                        if(copyBtn) copyBtn.style.display = "block";
                        if (zContainer) zContainer.style.display = "block";
                    }
                }, 30); 
            }

            function getDaysInMonth(year, month) {
                return new Date(year, month, 0).getDate();
            }

            // Global functions for Zodiac and Copy buttons
            window.showZodiac = function() {
                if(!userInput || !userInput.value) return;
                const birthDate = new Date(userInput.value);
                const month = birthDate.getMonth() + 1; 
                const day = birthDate.getDate();

                const sign = getZodiacSign(day, month);
                const stone = getBirthstone(month);

                if(zResult) {
                    zResult.innerHTML = `<strong>Zodiac Sign:</strong> ${sign} <br> <strong>Birthstone:</strong> ${stone}`;
                    zResult.style.display = "block";
                }
                if(zBtn) zBtn.style.display = "none";
            };

            function getZodiacSign(day, month) {
                if ((month == 1 && day <= 20) || (month == 12 && day >= 22)) return "♑ Capricorn (Makar)";
                if ((month == 1 && day >= 21) || (month == 2 && day <= 18)) return "♒ Aquarius (Kumbh)";
                if ((month == 2 && day >= 19) || (month == 3 && day <= 20)) return "♓ Pisces (Meen)";
                if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) return "♈ Aries (Mesh)";
                if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) return "♉ Taurus (Vrishabh)";
                if ((month == 5 && day >= 21) || (month == 6 && day <= 20)) return "♊ Gemini (Mithun)";
                if ((month == 6 && day >= 21) || (month == 7 && day <= 22)) return "♋ Cancer (Kark)";
                if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) return "♌ Leo (Singh)";
                if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) return "♍ Virgo (Kanya)";
                if ((month == 9 && day >= 23) || (month == 10 && day <= 22)) return "♎ Libra (Tula)";
                if ((month == 10 && day >= 23) || (month == 11 && day <= 21)) return "♏ Scorpio (Vrishchik)";
                if ((month == 11 && day >= 22) || (month == 12 && day <= 21)) return "♐ Sagittarius (Dhanu)";
                return "Unknown";
            }

            function getBirthstone(month) {
                const stones = [
                    "Garnet", "Amethyst", "Aquamarine", "Diamond", 
                    "Emerald", "Pearl", "Ruby", "Peridot", 
                    "Sapphire", "Opal", "Topaz", "Turquoise"
                ];
                return stones[month - 1];
            }

            window.copyResult = function() {
                if(!resultDisplay) return;
                const textToCopy = resultDisplay.innerText;
                navigator.clipboard.writeText(textToCopy).then(() => {
                    if(copyBtn) {
                        const icon = copyBtn.querySelector('i');
                        if (icon) {
                            icon.classList.replace('fa-copy', 'fa-check');
                            setTimeout(() => {
                                icon.classList.replace('fa-check', 'fa-copy');
                            }, 2000);
                        }
                    }
                });
            };
        });
    </script>
</body>
</html>
